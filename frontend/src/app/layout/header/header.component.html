<header class="header" [class.scrolled]="isScrolled">
  <nav class="navbar">
    <div class="navbar-container">

      <!-- Logo y Nombre - Izquierda -->
      <div class="navbar-logo">
        <a routerLink="/" class="logo-link">
          <div class="logo-icon">
            <span class="logo-circle blue-circle"></span>
            <span class="logo-circle green-circle"></span>
          </div>
          <span class="logo-text">
            Shar<span class="logo-text-green">Entrenamiento</span>
          </span>
        </a>
      </div>

      <!-- Hamburger Menu Button -->
      <div class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- Navigation Menu - Centro -->
      <ul class="nav-menu" [class.active]="isMenuOpen">
        <li class="nav-item">
          <a
            routerLink="/metodologia"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
          >
            Metodología
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/testimonios"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
          >
            Testimonios
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/seguridad"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
          >
            Seguridad
          </a>
        </li>

        <li class="nav-item">
          <a
            routerLink="/soporte"
            routerLinkActive="active"
            class="nav-link"
            (click)="closeMenu()"
          >
            Soporte
          </a>
        </li>
      </ul>

      <!-- Empezar Ahora - Derecha -->
      <div class="nav-auth">
        <a routerLink="/seleccion-rol" class="btn-cta" (click)="closeMenu()">
          Empezar Ahora
        </a>
      </div>

    </div>
  </nav>
</header>
